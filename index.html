<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Platformer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <h1 class="title">2D Platformer</h1>
        <div class="hint">
          Điều khiển: ← → / A D để chạy, ↑ / W / Space để nhảy, R để chơi lại
        </div>
      </header>

      <section class="stage">
        <canvas id="game" width="960" height="540" aria-label="Platformer game" tabindex="0"></canvas>
      </section>

      <footer class="footer">
        Mở trực tiếp file này trong trình duyệt để chơi.
      </footer>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
